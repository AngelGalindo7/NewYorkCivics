# promptfoo CI assertions (node/npx CLI — run with `npx promptfoo eval`).
#
# Rule 5 (Evals before agents): this runs on every PR and posts a before/after diff
# comment via the promptfoo-action (see .github/workflows/evals.yml).
#
# Phase 0 strategy — echo provider, 10 golden-set conformance tests:
#   The `echo` provider returns the prompt verbatim. Each test's "prompt" IS a valid
#   CivicEvent JSON drawn from ingest/eval/golden/ (the expected extractor output for
#   that agenda item). The `is-json` assertion validates that:
#     (a) the output is valid JSON                          ← schema conformance
#     (b) required fields are present                       ← contract is real
#     (c) ulurp_number matches the ULURP format regex       ← identifier bar (Rule 13)
#     (d) zoning codes are plausible strings                ← format check
#   When every test passes, every golden label is a valid CivicEvent AND the CI
#   harness is proven green before a real extractor exists.
#
# Phase 1 migration path (TODO):
#   Replace `- id: echo` with the Python file provider that calls extractor.py.
#   Un-comment the `repeat: 3` / 2-of-3 block for nondeterminism control.
#   Add GOOGLE_API_KEY / ANTHROPIC_API_KEY to repo secrets.
#   Add the full field-level F1 assertions once the golden set reaches ≥50 docs.
#
# --- REAL THRESHOLDS (authoritative copy owned by docs/EVAL.md) ---------------
#   Extraction field-level F1 >= 0.80; BLOCK deploy on >3pp regression.
#   ULURP accuracy  >= 0.70 (Phase 0 gate); >= 0.90 (Phase 2 gate).
#   Zoning accuracy >= 0.70 (Phase 0 gate); >= 0.90 (Phase 2 gate).
#   Hallucination   <= 1%  (Rule 3 — source grounding).
# -------------------------------------------------------------------------------

description: "NYC Civic ingestion — extractor schema-conformance CI (Phase 0, 10 golden cases)"

providers:
  # Dummy/echo provider: returns the prompt input verbatim. No API key, no cost.
  # Phase 1: replace with `file://ingest/extract/extractor_cli.py` (Python file provider).
  - id: echo

# Phase 1: enable repeat-3 / require-2-of-3 once a real (nondeterministic) provider lands.
# repeat: 3

prompts:
  # The prompt IS the expected extractor output for each test.
  # The echo provider echoes it back; the assertions then validate it.
  - "{{expected_output}}"

defaultTest:
  assert:
    # (a) Output is valid JSON conforming to the canonical CivicEvent record.
    - type: is-json
      value:
        type: object
        required: ["source_id", "source_record_id", "action_type", "event_date"]
        properties:
          source_id:         { type: string }
          source_record_id:  { type: string }
          project_thread_id: { type: ["string", "null"] }
          action_type:       { type: ["string", "null"] }
          title:             { type: ["string", "null"] }
          ulurp_number:
            oneOf:
              - { type: "null" }
              # Phase 0 format bar: if present, must look like a ULURP number.
              # Full regex is in ingest/extract/ulurp_codes.py; this is the CI proxy.
              - { type: string, pattern: "^[A-Z]{1,2}\\s*\\d{6}\\s*[A-Z]{2}[MXKQRY]$" }
          zoning_from:       { type: ["string", "null"] }
          zoning_to:         { type: ["string", "null"] }
          event_date:
            oneOf:
              - { type: "null" }
              - { type: string, pattern: "^\\d{4}-\\d{2}-\\d{2}$" }
          confidence:        { type: ["number", "null"], minimum: 0, maximum: 1 }
          status:
            oneOf:
              - { type: "null" }
              - { type: string, enum: ["accepted", "review", "unverified", "quarantined"] }
          provenance:        { type: object }
          extras:            { type: object }

# Per-field accuracy targets (Phase 0 gate): each test enforces field-level format via javascript assertions.
# ULURP cases: ulurp_number non-null, event_date YYYY-MM-DD, action_type string.
# Non-ULURP cases: ulurp_number null, event_date YYYY-MM-DD, action_type string.
# ZMA subset: also zoning_from + zoning_to non-null strings.
# Gate threshold: all 10 tests must pass (echo provider guarantees 100% in Phase 0).
# Phase 1: replace echo with real extractor; expect >=70% on ULURP/zoning fields.
tests:
  # --- 5 ULURP / zoning-map cases (the high-bar identifier targets) ----

  - description: "cb-mn11-2024-04-15-item-3 | MN CB11 ZMA R8→R9A C 240045 ZMM"
    vars:
      expected_output: >-
        {"source_id":"nyc_cb_agenda","source_record_id":"cb-mn11-2024-04-15-item-3",
         "action_type":"zoning_map_amendment","title":"ULURP C 240045 ZMM — Zoning Map Amendment, 2289 Second Avenue",
         "event_date":"2024-04-15","event_time":"18:30","deadline":"2024-04-29",
         "address":"2289 Second Avenue, New York, NY 10035",
         "ulurp_number":"C 240045 ZMM","zoning_from":"R8","zoning_to":"R9A",
         "confidence":0.95,"status":"accepted","provenance":{},"extras":{}}
    assert:
      - type: javascript
        value: "typeof JSON.parse(output).ulurp_number === 'string'"
      - type: javascript
        value: "/^\\d{4}-\\d{2}-\\d{2}$/.test(JSON.parse(output).event_date)"
      - type: javascript
        value: "typeof JSON.parse(output).action_type === 'string'"
      - type: javascript
        value: "typeof JSON.parse(output).zoning_from === 'string' && typeof JSON.parse(output).zoning_to === 'string'"

