# Run the configured linters before each commit. Install once: `pre-commit install`.
# Pins track requirements-dev.txt (ruff) and the mypy mirror.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff           # lint (auto-fix safe rules)
        args: [--fix]
      - id: ruff-format    # format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        files: ^ingest/
        additional_dependencies: [pydantic]
